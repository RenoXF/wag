# Nama alur kerja yang akan ditampilkan di tab Actions di GitHub
name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Pilih jenis kenaikan versi'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  tag:
    name: Bump Version and Create Tag
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      new_version_tag: ${{ steps.tag_version.outputs.new_version_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version, commit, and tag
        id: tag_version
        run: |
          NEW_VERSION=$(bun pm version ${{ github.event.inputs.version_bump }} -m "chore(release): bump version to %s")
          echo "new_version_tag=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Push changes and tags
        run: git push origin ${{ github.ref_name }} --follow-tags

  build:
    name: Build ${{ matrix.name }}
    needs: tag
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            target: windows
          - name: Linux x64
            runner: ubuntu-latest
            target: linux
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: linux-arm64
          - name: macOS
            runner: macos-latest
            target: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.new_version_tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun tsc --noEmit

      - name: Build binary
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NODE_ENV: production
          TZ: Asia/Jakarta
        run: bun ./build.ts ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ./out/*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./out
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_version_tag }}
          name: Release ${{ needs.tag.outputs.new_version_tag }}
          generate_release_notes: true
          files: ./out/*
