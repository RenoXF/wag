<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WAG - WhatsApp Gateway</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link rel="stylesheet" href="client.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand"><i class="bi bi-whatsapp"></i> WAG</div>
      <div class="sidebar-actions">
        <button class="icon-btn" onclick="showAddDeviceModal()" title="Add Device"><i class="bi bi-plus-lg"></i></button>
        <button class="icon-btn" onclick="showDeviceModal()" title="Devices"><i class="bi bi-phone"></i></button>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-box" id="searchInput" placeholder="Search or start new chat" oninput="filterChats()">
    </div>
    <div class="chat-list" id="chatList"></div>
  </aside>

  <main class="main-panel">
    <div id="chatView" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <div class="chat-avatar" id="chatAvatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatName">Loading...</div>
          <div class="chat-header-status" id="chatStatus">offline</div>
        </div>
        <div class="sidebar-actions">
          <button class="icon-btn" onclick="fetchMessages()" title="Refresh"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="reply-preview" id="replyPreview" style="display:none">
        <div class="reply-preview-line">
          <div class="reply-preview-name" id="replyName"></div>
          <div class="reply-preview-text" id="replyText"></div>
        </div>
        <span class="reply-close" onclick="cancelReply()">&times;</span>
      </div>
      <div class="input-area" style="position:relative">
        <button class="icon-btn" onclick="toggleAttachMenu()"><i class="bi bi-paperclip"></i></button>
        <input id="msgInput" placeholder="Type a message" onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="icon-btn primary" onclick="sendMsg()"><i class="bi bi-send"></i></button>
        <div class="attach-menu" id="attachMenu" style="display:none">
          <div class="attach-item" onclick="pickFile('image/*')"><i style="background:#ef5350"><i class="bi bi-image"></i></i><span>Image</span></div>
          <div class="attach-item" onclick="pickFile('audio/*')"><i style="background:#ff9800"><i class="bi bi-music-note"></i></i><span>Audio</span></div>
          <div class="attach-item" onclick="pickFile('video/*')"><i style="background:#4caf50"><i class="bi bi-camera-reels"></i></i><span>Video</span></div>
          <div class="attach-item" onclick="pickFile('*/*')"><i style="background:#2196f3"><i class="bi bi-file-earmark"></i></i><span>Document</span></div>
        </div>
        <input type="file" id="fileInput" style="display:none" onchange="sendMedia(event)">
      </div>
    </div>
    <div class="empty-state" id="emptyState">
      <i class="bi bi-whatsapp"></i>
      <p>Select a chat to start messaging</p>
    </div>
  </main>
</div>
<div class="toast-container" id="toastContainer"></div>
<div id="imageModal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.85);cursor:zoom-out;align-items:center;justify-content:center" onclick="this.style.display='none'">
  <img id="modalImage" style="max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain">
</div>
    <div id="addDeviceModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);align-items:center;justify-content:center" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:var(--panel-bg);border-radius:12px;padding:24px;width:420px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.5)">
    <h3 style="margin-bottom:16px;font-weight:600">Tambah Device Baru</h3>
    <input id="newDeviceName" placeholder="Nama device (contoh: HP Sales)" style="width:100%;padding:10px 14px;border:none;border-radius:8px;background:var(--input-bg);color:var(--text);font-size:14px;outline:none;margin-bottom:10px">
    <input id="newDevicePhone" placeholder="Nomor telepon untuk pairing via kode (opsional)" style="width:100%;padding:10px 14px;border:none;border-radius:8px;background:var(--input-bg);color:var(--text);font-size:14px;outline:none;margin-bottom:6px">
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">Kosongi untuk scan QR. Isi nomor untuk pairing via kode (lebih cepat).</p>
    <input id="newDeviceWebhook" placeholder="URL callback (default: http://localhost:8000)" value="http://localhost:8000" style="width:100%;padding:10px 14px;border:none;border-radius:8px;background:var(--input-bg);color:var(--text-secondary);font-size:13px;outline:none;margin-bottom:16px">
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">Webhook URL adalah alamat server eBilling yang menerima notifikasi status device. Default: <code>http://localhost:8000</code></p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="$('addDeviceModal').style.display='none'">Batal</button>
      <button class="btn btn-success" onclick="createDevice()">Tambah & Scan QR</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let currentDevice = null, currentJid = null;
let devices = [], chats = [], replyTarget = null;
let liveSse = null, pollTimer = null, msgOffset = 0, allMessages = [];

// ── Helpers ──
function $(id) { return document.getElementById(id); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  $('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function showImage(src) {
  $('modalImage').src = src;
  $('imageModal').style.display = 'flex';
}
function mediaError(el) {
  el.style.display = 'none';
  const div = document.createElement('div');
  div.style.cssText = 'padding:8px;color:var(--text-secondary);font-style:italic;font-size:12px';
  div.textContent = 'Media tidak tersedia';
  el.parentElement.appendChild(div);
}

// ── Add Device Modal ──
function showAddDeviceModal() {
  $('newDeviceName').value = '';
  $('newDevicePhone').value = '';
  $('addDeviceModal').style.display = 'flex';
  setTimeout(() => $('newDeviceName').focus(), 100);
}

async function createDevice() {
  const name = $('newDeviceName').value.trim();
  if (!name) { toast('Nama device wajib diisi', 'error'); return; }

  const phone = $('newDevicePhone').value.trim() || null;
  const webhookBase = $('newDeviceWebhook').value.trim().replace(/\/+$/, '') || 'http://localhost:8000';
  const deviceId = crypto.randomUUID();

  $('addDeviceModal').style.display = 'none';

  try {
    toast('Membuat device ' + name + '...');
    const body = {
      deviceId,
      name,
      webhookUrl: webhookBase + '/callback/whatsapp/' + deviceId,
    };
    if (phone) body.phoneNumber = phone;

    await api('/connections/start', {
      method: 'POST',
      body: JSON.stringify(body),
    });

    toast('Device dibuat');
    await loadDevices();

    await new Promise(r => setTimeout(r, 2000));

    if (phone) {
      await showPairingCode(deviceId);
    } else {
      await showQr(deviceId);
    }
  } catch (e) { toast('Gagal: ' + e.message, 'error'); }
}

// ── Device Actions ──
async function quickStart(deviceId) {
  try {
    await api('/connections/start', {
      method: 'POST',
      body: JSON.stringify({ deviceId }),
    });
    toast('Device started');
    loadDevices();
    setTimeout(loadDevices, 2000);
  } catch (e) { toast('Start failed: ' + e.message, 'error'); }
}

async function quickStop(deviceId) {
  try {
    await api('/connections/stop', {
      method: 'POST',
      body: JSON.stringify({ deviceId }),
    });
    toast('Device stopped');
    loadDevices();
  } catch (e) { toast('Stop failed: ' + e.message, 'error'); }
}

async function showPairingCode(deviceId) {
  try {
    const conn = await api('/connections/' + deviceId);
    const status = conn.data?.currentStatus;
    if (status?.isLoggedIn) {
      toast('Device sudah terhubung', 'error');
      return;
    }

    // polling sampai pairing code tersedia
    let pairCode = null;
    for (let i = 0; i < 10; i++) {
      const d = await api('/connections/qr-code?deviceId=' + deviceId);
      pairCode = d.data?.pairingCode;
      if (pairCode) break;
      await new Promise(r => setTimeout(r, 1500));
    }

    if (!pairCode) {
      toast('Pairing code tidak tersedia, coba scan QR', 'error');
      await showQr(deviceId);
      return;
    }

    const existing = document.getElementById('qrCanvasContainer');
    if (existing) existing.remove();

    const container = document.createElement('div');
    container.id = 'qrCanvasContainer';
    container.style.cssText = 'position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:16px;padding:24px';
    container.onclick = () => container.remove();

    const label = document.createElement('div');
    label.style.cssText = 'color:var(--text-secondary);font-size:13px;text-align:center';
    label.textContent = 'Masukkan kode ini di WhatsApp > Linked Devices > Pair with phone number';

    const codeDisplay = document.createElement('div');
    codeDisplay.style.cssText = 'font-size:36px;font-weight:700;letter-spacing:6px;color:var(--text);background:var(--input-bg);padding:16px 32px;border-radius:12px;font-family:monospace';
    codeDisplay.textContent = pairCode;

    const hint = document.createElement('div');
    hint.style.cssText = 'color:var(--text-secondary);font-size:12px;text-align:center';
    hint.innerHTML = 'Kode akan otomatis terhubung setelah dimasukkan.<br>Klik di luar kotak untuk tutup.';

    container.appendChild(label);
    container.appendChild(codeDisplay);
    container.appendChild(hint);
    document.body.appendChild(container);
  } catch (e) { toast('Pairing error: ' + e.message, 'error'); }
}

async function showQr(deviceId) {
  try {
    // cek status device dulu
    const conn = await api('/connections/' + deviceId);
    const status = conn.data?.currentStatus;
    if (status?.isLoggedIn) {
      toast('Device sudah terhubung', 'error');
      return;
    }

    // start device dulu kalau offline
    if (!status?.connectionState || status.connectionState === 'close') {
      toast('Memulai device...');
      await api('/connections/start', {
        method: 'POST',
        body: JSON.stringify({ deviceId }),
      });
      await new Promise(r => setTimeout(r, 2000));
    }

    // ambil QR
    const d = await api('/connections/qr-code?deviceId=' + deviceId);
    const qr = d.data?.qrCode;
    if (!qr) { toast('QR belum tersedia, coba lagi', 'error'); return; }

    const existing = document.getElementById('qrCanvasContainer');
    if (existing) existing.remove();

    const container = document.createElement('div');
    container.id = 'qrCanvasContainer';
    container.style.cssText = 'position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:16px';
    container.onclick = () => container.remove();

    const canvas = document.createElement('canvas');
    let pollTimer;
    let currentQr = qr;

    function renderQr(text) {
      canvas.innerHTML = '';
      QRCode.toCanvas(canvas, text, { width: 280 }, (err) => {
        if (err) { toast('QR generation failed', 'error'); return; }
        canvas.style.maxWidth = '90vw';
        canvas.style.maxHeight = '90vh';
        canvas.style.borderRadius = '12px';
      });
    }

    renderQr(qr);

    // polling QR rolling tiap 10 detik
    pollTimer = setInterval(async () => {
      try {
        const d = await api('/connections/qr-code?deviceId=' + deviceId);
        const newQr = d.data?.qrCode;
        if (newQr && newQr !== currentQr) {
          currentQr = newQr;
          renderQr(newQr);
        }
      } catch {}
    }, 10000);

    const hint = document.createElement('div');
    hint.style.cssText = 'color:var(--text-secondary);font-size:13px;text-align:center';
    hint.textContent = 'Scan QR ini dari WhatsApp > Linked Devices';

    container.onclick = () => {
      clearInterval(pollTimer);
      container.remove();
    };

    container.appendChild(canvas);
    container.appendChild(hint);
    document.body.appendChild(container);
  } catch (e) { toast('QR error: ' + e.message, 'error'); }
}

async function reloadDevice(deviceId) {
  try {
    await api('/connections/stop', {
      method: 'POST',
      body: JSON.stringify({ deviceId }),
    });
    await api('/connections/start', {
      method: 'POST',
      body: JSON.stringify({
        deviceId,
        webhookUrl: API + '/callback/whatsapp/' + deviceId,
      }),
    });
    toast('Device reloaded');
    loadDevices();
    setTimeout(loadDevices, 3000);
  } catch (e) { toast('Reload failed: ' + e.message, 'error'); }
}

// ── Message Actions ──
function setReplyFrom(event) {
  event.stopPropagation();
  const data = JSON.parse(event.currentTarget.getAttribute('data-msg'));
  const parent = event.currentTarget.closest('.msg');
  replyTarget = data.jid + '-' + data.id;
  $('replyPreview').style.display = 'flex';
  const text = parent?.querySelector('.msg-text')?.textContent || '(media)';
  $('replyName').textContent = data.fromMe ? 'You' : 'Them';
  $('replyText').textContent = text.substring(0, 60);
  $('msgInput').focus();
}

async function deleteMsg(event) {
  event.stopPropagation();
  const key = event.currentTarget.getAttribute('data-key');
  if (!key || !confirm('Hapus pesan ini untuk semua orang?')) return;
  try {
    const idx = key.lastIndexOf('-');
    const jid = key.slice(0, idx);
    const id = key.slice(idx + 1);
    await api('/messages/delete/' + currentDevice, {
      method: 'POST',
      body: JSON.stringify({ jid, messageId: id }),
    });
    toast('Pesan dihapus');
    fetchMessages();
  } catch (e) { toast('Gagal: ' + e.message, 'error'); }
}

async function forwardMsg(event) {
  event.stopPropagation();
  const key = event.currentTarget.getAttribute('data-key');
  const target = prompt('Masukkan JID tujuan (contoh: 62812xxx@s.whatsapp.net):');
  if (!target || !key) return;
  try {
    await api('/messages/forward/' + currentDevice, {
      method: 'POST',
      body: JSON.stringify({ targetJid: target, messageKey: key }),
    });
    toast('Pesan diteruskan');
  } catch (e) { toast('Gagal: ' + e.message, 'error'); }
}

async function deleteDevice(deviceId) {
  if (!confirm('Delete device ' + deviceId.substring(0, 8) + '...? This will logout and remove all session data.')) return;
  try {
    await api('/connections/logout', {
      method: 'POST',
      body: JSON.stringify({ deviceId }),
    });
    toast('Device deleted');
    loadDevices();
  } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000 && d.getDate() === now.getDate()) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diff < 172800000) return 'Yesterday';
  return d.toLocaleDateString([], { day: 'numeric', month: 'short' });
}
function fmtFullDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return 'Today';
  const y = new Date(now); y.setDate(y.getDate() - 1);
  if (d.toDateString() === y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function getPushName(msg) {
  if (!msg) return null;
  return msg.pushName || null;
}
function formatJid(jid) {
  if (!jid) return 'Unknown';
  const name = jid.split('@')[0];
  if (name.startsWith('62')) return '0' + name.slice(2);
  if (name.startsWith('12036')) return name.slice(0, 6) + '...' + name.slice(-4);
  return name;
}
function bestName(chat) {
  if (chat?.name) return chat.name;
  const pushName = getPushName(chat?.lastMessage);
  if (pushName) return pushName;
  return formatJid(chat?.jid);
}
function getChatName(jid, contact) {
  if (contact?.name) return contact.name;
  const name = jid.split('@')[0];
  return name.startsWith('62') ? '0' + name.slice(2) : name;
}
function getMsgContent(msg) {
  if (!msg?.message) return { text: '[Media message]', type: 'text' };
  const m = msg.message;
  if (m.conversation) return { text: m.conversation, type: 'text' };
  if (m.extendedTextMessage?.text) return { text: m.extendedTextMessage.text, type: 'text' };
  if (m.imageMessage) return { text: m.imageMessage.caption || '📷 Image', type: 'image', obj: m.imageMessage };
  if (m.videoMessage) return { text: m.videoMessage.caption || '🎬 Video', type: 'video', obj: m.videoMessage };
  if (m.audioMessage) return { text: '🎵 Audio', type: 'audio', obj: m.audioMessage };
  if (m.documentMessage) return { text: m.documentMessage.fileName || '📄 Document', type: 'document', obj: m.documentMessage };
  if (m.stickerMessage) return { text: 'Sticker', type: 'sticker', obj: m.stickerMessage };
  return { text: '[Media message]', type: 'unknown' };
}
function getMsgId(msg) {
  return msg.key?.id || '';
}
function getMsgRemoteJid(msg) {
  return msg.key?.remoteJid || '';
}

// ── API ──
async function api(url, opts = {}) {
  const headers = { 'Accept': 'application/json' };
  if (!(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }
  const res = await fetch(API + url, { ...opts, headers });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res;
}

// ── Load Devices ──
async function loadDevices() {
  try {
    const d = await api('/connections');
    devices = d.data || [];
    renderDeviceList();
  } catch (e) { toast('Failed to load devices: ' + e.message, 'error'); }
}

function renderDeviceList() {
  const cards = $('chatList');
  cards.innerHTML = devices.map(dev => {
    const status = dev.currentStatus?.isLoggedIn ? 'ONLINE' : dev.status;
    const statusDot = status === 'open' || status === 'ONLINE' ? '🟢' : status === 'connecting' ? '🟡' : '🔴';
    const isOnline = status === 'open' || status === 'ONLINE';
    const isConnecting = status === 'connecting';
    return `<div class="chat-item" onclick="selectDevice('${dev.id}')">
      <div class="chat-avatar" style="background:#8696a0">${esc(dev.name?.[0] || '?')}</div>
      <div class="chat-info">
        <div class="chat-name">${esc(dev.name || dev.id)}</div>
        <div class="chat-preview">${statusDot} ${status}</div>
      </div>
      <div class="device-actions" onclick="event.stopPropagation()">
        ${!isOnline && !isConnecting ? `<button onclick="quickStart('${dev.id}')" title="Start"><i class="bi bi-play-fill"></i></button>` : ''}
        ${isOnline || isConnecting ? `<button onclick="quickStop('${dev.id}')" title="Stop"><i class="bi bi-stop-fill"></i></button>` : ''}
        ${isOnline || isConnecting ? `<button onclick="showQr('${dev.id}')" title="QR"><i class="bi bi-qr-code"></i></button>` : ''}
        <button onclick="reloadDevice('${dev.id}')" title="Reload"><i class="bi bi-arrow-clockwise"></i></button>
        <button onclick="deleteDevice('${dev.id}')" title="Delete" class="danger"><i class="bi bi-trash3"></i></button>
      </div>
    </div>`;
  }).join('');
  if (!devices.length) cards.innerHTML = '<div class="empty-state"><p>No devices. Add one to start.</p></div>';
}

// ── Select Device & Load Chats ──
async function selectDevice(id) {
  currentDevice = id;
  currentJid = null;
  $('chatView').style.display = 'none';
  $('emptyState').style.display = 'flex';
  disconnectLiveSse();
  loadChats();
}

async function loadChats() {
  if (!currentDevice) return;
  try {
    const d = await api('/contacts/' + currentDevice);
    chats = d.data || [];
    renderChats();
    subscribeLiveSse();
  } catch (e) { toast('Failed to load chats: ' + e.message, 'error'); }
}

function renderChats() {
  const el = $('chatList');
  const dev = devices.find(d => d.id === currentDevice);
  let html = `<div class="chat-item" onclick="showDevices()">
    <div class="chat-avatar" style="background:#8696a0"><i class="bi bi-arrow-left"></i></div>
    <div class="chat-info">
      <div class="chat-name">${esc(dev?.name || currentDevice)}</div>
      <div class="chat-preview">🟢 Back to devices</div>
    </div>
  </div>`;
  html += chats.map(c => {
    const uc = c.unreadCount || 0;
    const name = bestName(c);
    return `<div class="chat-item${c.jid === currentJid ? ' active' : ''}" data-jid="${esc(c.jid)}" data-name="${esc(name.toLowerCase())}" onclick="selectChat('${c.jid}')">
      <div class="chat-avatar">${esc(name[0] || '?')}${uc > 0 ? `<span class="chat-unread">${uc > 99 ? '99+' : uc}</span>` : ''}</div>
      <div class="chat-info">
        <div class="chat-meta">
          <div class="chat-name">${esc(name)}</div>
          <div class="chat-time">${fmtDate(c.lastTimestamp)}</div>
        </div>
        <div class="chat-preview">${esc(getMsgContent(c.lastMessage).text.substring(0, 40))}</div>
      </div>
    </div>`;
  }).join('');
  if (!chats.length && !devices.length) html += '<div class="empty-state"><p>No chats yet</p></div>';
  el.innerHTML = html;
  document.querySelectorAll('.chat-item').forEach(el => {
    const jid = el.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    if (jid === currentJid) el.classList.add('active');
  });
}

// ── Select Chat ──
async function selectChat(jid) {
  currentJid = jid;
  msgOffset = 0;
  allMessages = [];
  $('chatView').style.display = 'flex';
  $('emptyState').style.display = 'none';
  cancelReply();

  const chat = chats.find(c => c.jid === jid);
  const isGroup = jid.endsWith('@g.us');
  $('chatAvatar').textContent = (chat?.name || (isGroup ? '#' : '?'))[0];
  $('chatName').textContent = chat?.name || (isGroup ? 'Group' : jid.split('@')[0]);
  $('chatStatus').textContent = 'online';

  // mark as read
  try { await api('/messages/read/' + currentDevice + '/' + encodeURIComponent(jid), { method: 'POST' }); } catch {}

  renderChats();
  await fetchMessages();
}

let loadingMessages = false;

async function fetchMessages(loadMore = false) {
  if (!currentDevice || !currentJid || loadingMessages) return;
  loadingMessages = true;
  try {
    const limit = 50;
    const d = await api('/messages/' + currentDevice + '/' + encodeURIComponent(currentJid) + '?limit=' + limit + '&offset=' + (loadMore ? msgOffset : 0));
    const msgs = d.data || [];
    if (loadMore) {
      allMessages = [...msgs, ...allMessages];
      msgOffset += msgs.length;
      renderMessages(allMessages, true);
    } else {
      allMessages = msgs;
      msgOffset = msgs.length;
      renderMessages(msgs, false);
    }
  } catch (e) { console.error('fetchMessages error:', e); }
  loadingMessages = false;
}

function getMsgContentFromObj(m) {
  const r = getMsgContent(m);
  if (m.message?.extendedTextMessage?.contextInfo?.quotedMessage) {
    r.quoted = m.message.extendedTextMessage.contextInfo;
  }
  return r;
}

function renderMessages(msgs, keepScroll = false) {
  const el = $('messagesArea');
  const prevHeight = keepScroll ? el.scrollHeight : 0;
  if (!msgs.length) {
    el.innerHTML = '<div class="empty-state"><p>No messages</p></div>';
    return;
  }
  const sorted = [...msgs].sort((a, b) => (a.messageTimestamp || 0) - (b.messageTimestamp || 0));
  let html = '', lastDate = '';
  if (msgOffset >= 50) {
    html += `<div class="load-more" onclick="fetchMessages(true)"><i class="bi bi-arrow-up"></i> Muat pesan sebelumnya</div>`;
  }
  for (const m of sorted) {
    const isMe = m.key?.fromMe;
    const content = getMsgContentFromObj(m);
    const time = fmtDate(m.messageTimestamp);
    const dateStr = fmtFullDate(m.messageTimestamp);
    if (dateStr !== lastDate) {
      html += `<div class="date-separator"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
    }
    html += `<div class="msg ${isMe ? 'outgoing' : 'incoming'}">`;
    html += '<div class="msg-bubble">';
    // forwarded label
    const isFwd = m.message?.extendedTextMessage?.contextInfo?.isForwarded
      || m.message?.extendedTextMessage?.contextInfo?.forwardingScore > 0
      || m.message?.imageMessage?.contextInfo?.isForwarded
      || m.message?.videoMessage?.contextInfo?.isForwarded
      || m.message?.documentMessage?.contextInfo?.isForwarded;
    // quoted reply
    if (content.quoted) {
      const q = content.quoted;
      const qc = getMsgContent({ message: q.quotedMessage });
      const qType = qc.type;
      const qIcon = qType === 'image' ? '📷' : qType === 'video' ? '🎬' : qType === 'audio' ? '🎵' : qType === 'document' ? '📄' : qType === 'sticker' ? '🎨' : '';
      html += `<div class="msg-reply"><div class="msg-reply-name">${isMe ? 'You' : 'Them'}</div>`;
      html += esc(qIcon + ' ' + qc.text.substring(0, 80)) + '</div>';
    }
    if (isFwd) {
      html += '<div class="msg-forwarded"><i class="bi bi-forward"></i> Forwarded</div>';
    }
    // media content
    if (content.type === 'image') {
      const key = getMsgRemoteJid(m) + '-' + getMsgId(m);
      html += `<img class="msg-image" src="/messages/media/${currentDevice}/${encodeURIComponent(key)}" alt="image" onerror="mediaError(this)" onclick="showImage(this.src)">`;
      if (content.text && !content.text.startsWith('📷')) html += `<div class="msg-text">${esc(content.text)}</div>`;
    } else if (content.type === 'video') {
      const key = getMsgRemoteJid(m) + '-' + getMsgId(m);
      html += `<video class="msg-video" src="/messages/media/${currentDevice}/${encodeURIComponent(key)}" controls onerror="mediaError(this)"></video>`;
      if (content.text && !content.text.startsWith('🎬')) html += `<div class="msg-text">${esc(content.text)}</div>`;
    } else if (content.type === 'audio') {
      const key = getMsgRemoteJid(m) + '-' + getMsgId(m);
      html += `<audio class="msg-audio" src="/messages/media/${currentDevice}/${encodeURIComponent(key)}" controls onerror="mediaError(this)"></audio>`;
    } else if (content.type === 'document') {
      const key = getMsgRemoteJid(m) + '-' + getMsgId(m);
      html += `<div class="msg-document" onclick="window.open('/messages/media/${currentDevice}/${encodeURIComponent(key)}')">
        <i class="bi bi-file-earmark"></i>
        <div class="msg-doc-info">
          <div class="msg-doc-name">${esc(content.obj?.fileName || 'Document')}</div>
          <div class="msg-doc-size">${content.obj?.fileSize ? Math.round(content.obj.fileSize / 1024) + ' KB' : ''}</div>
        </div>
      </div>`;
    } else if (content.type === 'sticker') {
      const key = getMsgRemoteJid(m) + '-' + getMsgId(m);
      html += `<img class="msg-sticker" src="/messages/media/${currentDevice}/${encodeURIComponent(key)}" alt="sticker" onerror="this.style.display='none'">`;
    } else {
      html += `<div class="msg-text">${esc(content.text)}</div>`;
    }
    // footer
    html += '<div class="msg-footer">';
    html += `<span>${time}</span>`;
    if (isMe) {
      const status = m.status; // 1=sent, 2=delivered, 3=read
      html += `<span class="msg-check ${status >= 2 ? '' : 'delivered'}"><i class="bi bi-check${status >= 2 ? '-all' : ''}"></i></span>`;
    }
    // message actions
    const msgKey = getMsgRemoteJid(m) + '-' + getMsgId(m);
    const msgData = esc(JSON.stringify({ id: m.key?.id, jid: m.key?.remoteJid, fromMe: isMe }));
    html += `<div class="msg-actions">
      <button data-msg='${msgData}' onclick="setReplyFrom(event)" title="Balas"><i class="bi bi-reply"></i></button>
      ${isMe ? `<button data-key='${msgKey}' onclick="deleteMsg(event)" title="Hapus"><i class="bi bi-trash3"></i></button>` : ''}
      <button data-key='${msgKey}' onclick="forwardMsg(event)" title="Teruskan"><i class="bi bi-forward"></i></button>
    </div>`;
    html += '</div></div></div>';
  }
  el.innerHTML = html;
  if (keepScroll) {
    el.scrollTop = el.scrollHeight - prevHeight;
  } else {
    el.scrollTop = el.scrollHeight;
  }
}

// ── Send Message ──
function sendMsg() {
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text || !currentDevice || !currentJid) return;

  if (replyTarget) {
    api('/messages/send-reply', {
      method: 'POST',
      body: JSON.stringify({
        deviceId: currentDevice,
        recipient: currentJid,
        message: text,
        replyMessageKey: replyTarget
      })
    }).then(() => {
      input.value = '';
      cancelReply();
      fetchMessages();
      loadChats();
    }).catch(e => toast('Reply failed: ' + e.message, 'error'));
  } else {
    api('/messages/send-text-message', {
      method: 'POST',
      body: JSON.stringify({
        deviceId: currentDevice,
        recipient: currentJid,
        message: text,
        sendPresence: true
      })
    }).then(() => {
      input.value = '';
      fetchMessages();
      loadChats();
    }).catch(e => toast('Send failed: ' + e.message, 'error'));
  }
}

// ── Reply ──
function setReply(msg) {
  const content = getMsgContent(msg);
  replyTarget = { id: msg.key.id, remoteJid: msg.key.remoteJid, fromMe: msg.key.fromMe };
  $('replyPreview').style.display = 'flex';
  $('replyName').textContent = msg.key.fromMe ? 'You' : 'Them';
  $('replyText').textContent = content.text.substring(0, 60);
  $('msgInput').focus();
}

function cancelReply() {
  replyTarget = null;
  $('replyPreview').style.display = 'none';
}

// ── Send Media ──
function pickFile(accept) {
  $('attachMenu').style.display = 'none';
  const input = $('fileInput');
  input.accept = accept;
  input.click();
}

async function sendMedia(event) {
  const file = event.target.files[0];
  if (!file || !currentDevice || !currentJid) return;

  const fd = new FormData();
  fd.append('deviceId', currentDevice);
  fd.append('recipient', currentJid);
  fd.append('file', file);
  if (replyTarget) fd.append('replyId', replyTarget.id);

  try {
    await api('/messages/send-media', { method: 'POST', body: fd });
    cancelReply();
    toast('Media sent');
    fetchMessages();
    loadChats();
  } catch (e) { toast('Send media failed: ' + e.message, 'error'); }
  event.target.value = '';
}

function toggleAttachMenu() {
  const el = $('attachMenu');
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

// ── SSE Live ──
let typingTimers = {};

function subscribeLiveSse() {
  disconnectLiveSse();
  if (!currentDevice) return;

  liveSse = new EventSource(API + '/sse/' + currentDevice + '/live');
  liveSse.onmessage = (ev) => {
    try {
      const d = JSON.parse(ev.data);
      if (d.type === 'new_message' || d.type === 'message_update') {
        loadChats();
        const jid = d.data?.key?.remoteJid;
        if (jid === currentJid) fetchMessages();
        // desktop notification untuk pesan baru dari chat lain
        if (d.type === 'new_message' && jid && jid !== currentJid && Notification.permission === 'granted' && !d.data?.key?.fromMe) {
          const chat = chats.find(c => c.jid === jid);
          const name = chat ? bestName(chat) : formatJid(jid);
          const content = getMsgContent(d.data).text.substring(0, 80);
          new Notification(name, { body: content, icon: '/icon.ico' });
        }
      } else if (d.type === 'presence') {
        const { jid, presence } = d.data;
        if (jid === currentJid) {
          const statusEl = $('chatStatus');
          if (presence === 'composing' || presence === 'recording') {
            const label = presence === 'recording' ? 'merekam...' : 'mengetik...';
            statusEl.textContent = label;
            statusEl.style.color = 'var(--accent)';
            clearTimeout(typingTimers[jid]);
            typingTimers[jid] = setTimeout(() => {
              statusEl.textContent = 'online';
              statusEl.style.color = '';
            }, 3000);
          } else if (presence === 'available') {
            statusEl.textContent = 'online';
            statusEl.style.color = '';
          } else if (presence === 'unavailable') {
            statusEl.textContent = 'offline';
            statusEl.style.color = '';
          }
        }
      }
    } catch {}
  };
  liveSse.onerror = () => {};
}

function disconnectLiveSse() {
  if (liveSse) { liveSse.close(); liveSse = null; }
}

// ── Device Dashboard Modal ──
function showDeviceModal() {
  // Simple device list - navigate back to device view
  currentDevice = null;
  currentJid = null;
  $('chatView').style.display = 'none';
  $('emptyState').style.display = 'flex';
  disconnectLiveSse();
  loadDevices();
}

function showDevices() {
  currentDevice = null;
  currentJid = null;
  $('chatView').style.display = 'none';
  $('emptyState').style.display = 'flex';
  disconnectLiveSse();
  loadDevices();
}

let searchDebounce;
function filterChats() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const q = $('searchInput').value.toLowerCase().trim();
    document.querySelectorAll('.chat-item').forEach(el => {
      const name = el.getAttribute('data-name') || '';
      const jid = el.getAttribute('data-jid') || '';
      el.style.display = (!q || name.includes(q) || jid.includes(q)) ? 'flex' : 'none';
    });
  }, 300);
}

// ── Init ──
if (Notification && Notification.permission === 'default') {
  Notification.requestPermission();
}
loadDevices();
setInterval(() => { if (currentJid) fetchMessages(); else if (currentDevice) loadChats(); }, 5000);
</script>
